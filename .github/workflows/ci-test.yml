name: CI test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  FunctionalTest:
    runs-on: ubuntu-latest

    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Source branch checkout
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "0.11.6"

    - name: LNST Setup
      run: bash .github/lnst_setup.sh

    - name: SimpleNetworkRecipe ping test
      run: |
        sudo -E env "PATH=$PATH" uv run .github/runner.py

  ENRT_All_Test:
    runs-on: ubuntu-latest

    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Source branch checkout
      uses: actions/checkout@v4

    - name: Fetch base branch
      if: github.event_name == 'pull_request'
      run: |
        git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "0.11.6"

    - name: LNST Setup
      run: bash .github/lnst_setup.sh

    - name: Run all ENRT recipes
      run: |
        sudo -E env "PATH=$PATH" uv run .github/runner_all_enrt.py

  ENRT_PingFlood:
    runs-on: ubuntu-latest

    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Source branch checkout
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "0.11.6"

    - name: LNST Setup
      run: bash .github/lnst_setup.sh

    - name: Run PingFlood
      run: |
        sudo -E env "PATH=$PATH" uv run .github/runner_ping_flood.py

  ImportsCheck:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Source branch checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.11.6"

      - name: LNST Setup
        run: bash .github/lnst_setup.sh

      - name: Imports check
        run: |
          uv run pylint --disable=all --enable=W0611 lnst
