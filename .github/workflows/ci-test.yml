name: CI test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  FunctionalTest:
    runs-on: ubuntu-latest

    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Source branch checkout
      uses: actions/checkout@v4

    - name: LNST Setup
      run: bash .github/lnst_setup.sh

    - name: SimpleNetworkRecipe ping test
      run: |
        sudo uv run .github/runner.py

  ENRT_All_Test:
    runs-on: ubuntu-latest

    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Source branch checkout
      uses: actions/checkout@v4

    - name: LNST Setup
      run: bash .github/lnst_setup.sh

    - name: Run all ENRT recipes
      run: |
        sudo uv run .github/runner_all_enrt.py

  ENRT_PingFlood:
    runs-on: ubuntu-latest

    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Source branch checkout
      uses: actions/checkout@v4

    - name: LNST Setup
      run: bash .github/lnst_setup.sh

    - name: Run PingFlood
      run: |
        sudo uv run .github/runner_ping_flood.py

  ImportsCheck:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Source branch checkout
        uses: actions/checkout@v4

      - name: LNST Setup
        run: bash .github/lnst_setup.sh

      - name: Imports check
        run: |
          uv run pylint --disable=all --enable=W0611 lnst
